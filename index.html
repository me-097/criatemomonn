<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学校祭マップ 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #eef1f7;
            --panel:   rgba(255,255,255,0.75);
            --border:  rgba(0,0,0,0.07);
            --accent:  #6366f1;
            --accent2: #f472b6;
            --accent3: #fb923c;
            --text:    #1e1b4b;
            --muted:   rgba(30,27,75,0.4);
            --shadow:  0 4px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        #three { position: fixed; inset: 0; z-index: 1; }

        /* ── ローディング ── */
        #loading {
            position: fixed; inset: 0; z-index: 300;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 28px;
            background: linear-gradient(160deg, #e0e8ff 0%, #fce7f3 50%, #fef3c7 100%);
            transition: opacity 0.7s ease;
        }
        #loading-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 72px; letter-spacing: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1;
        }
        #loading-sub {
            font-size: 11px; letter-spacing: 5px; color: var(--muted);
            text-transform: uppercase; margin-top: -20px;
        }
        #loading-bar-track {
            width: 240px; height: 3px;
            background: rgba(0,0,0,0.08); border-radius: 99px; overflow: hidden;
        }
        #loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            width: 0%; transition: width 0.3s ease; border-radius: 99px;
        }
        #loading-percent { font-size: 12px; letter-spacing: 3px; color: var(--muted); }

        /* ── ヘッダー ── */
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 58px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            background: var(--panel);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 0 rgba(255,255,255,0.9);
        }
        #header-left { display: flex; align-items: center; gap: 12px; }
        #logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(99,102,241,0.35);
            flex-shrink: 0;
        }
        #logo-icon svg { width: 17px; height: 17px; fill: white; }
        .h-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
        #title-wrap { display: flex; flex-direction: column; gap: 1px; }
        #title-main {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 21px; letter-spacing: 3px; color: var(--text); line-height: 1;
        }
        #title-sub { font-size: 9px; letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase; }
        #header-right { display: flex; align-items: center; gap: 10px; }
        #header-date { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
        #status-chip {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 10px;
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 999px;
        }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 6px #22c55e;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
        #status-text { font-size: 10px; letter-spacing: 1.5px; color: var(--accent); font-weight: 600; }

        /* ── 階層セレクター ── */
        #floor-selector {
            position: fixed; top: 50%; right: 20px;
            transform: translateY(-50%);
            z-index: 100;
            display: flex; flex-direction: column;
            opacity: 0; transition: opacity 0.5s ease 0.3s;
            background: var(--panel);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
            box-shadow: var(--shadow);
        }
        #floor-selector.visible { opacity: 1; }
        #floor-label {
            font-size: 8px; letter-spacing: 3px; color: var(--muted);
            text-transform: uppercase; text-align: center;
            padding: 10px 0 6px; border-bottom: 1px solid var(--border);
        }
        .floor-btn {
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1px;
            padding: 14px 18px;
            background: transparent; border: none;
            border-bottom: 1px solid var(--border);
            cursor: pointer; transition: all 0.18s ease;
            width: 76px; color: var(--muted);
        }
        .floor-btn:last-child { border-bottom: none; }
        .floor-btn:hover { background: rgba(99,102,241,0.06); color: var(--accent); }
        .floor-btn.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(244,114,182,0.07));
            color: var(--accent);
        }
        .floor-btn.active::before {
            content: '';
            position: absolute; left: 0; top: 20%; bottom: 20%;
            width: 3px; border-radius: 0 3px 3px 0;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
        }
        .floor-num { font-family: 'Bebas Neue', sans-serif; font-size: 23px; letter-spacing: 1px; line-height: 1; }
        .floor-tag { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.6; }

        /* ── 操作ガイド ── */
        #controls-panel {
            position: fixed; bottom: 24px; left: 20px; z-index: 100;
            background: var(--panel);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 14px;
            display: flex; flex-direction: column; gap: 6px;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
            box-shadow: var(--shadow);
        }
        #controls-panel.visible { opacity: 1; transform: translateY(0); }
        .ctrl-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--muted); }
        .ctrl-key {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 40px; height: 18px;
            border: 1px solid var(--border); border-radius: 3px;
            font-size: 8px; color: var(--accent);
            background: rgba(99,102,241,0.05); font-family: monospace; padding: 0 5px;
        }

        /* ── 情報パネル ── */
        #info-panel {
            position: fixed; bottom: 24px; right: 20px; z-index: 100;
            background: var(--panel);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: 14px;
            padding: 14px 18px; min-width: 160px;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.5s ease 0.4s, transform 0.5s ease 0.4s;
            box-shadow: var(--shadow); overflow: hidden;
            display: flex; align-items: center; gap: 12px;
        }
        #info-panel.visible { opacity: 1; transform: translateY(0); }
        #info-panel::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
        }
        .info-icon-wrap {
            width: 38px; height: 38px; flex-shrink: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(244,114,182,0.12));
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .info-text { display: flex; flex-direction: column; gap: 2px; }
        .info-label { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
        .info-value { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; color: var(--text); }

        /* ── トースト ── */
        #floor-toast {
            position: fixed; top: 70px; left: 50%;
            transform: translateX(-50%) translateY(-6px);
            z-index: 300;
            background: var(--panel);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 999px; padding: 7px 20px;
            font-size: 11px; letter-spacing: 2.5px;
            color: var(--accent); font-weight: 600; text-transform: uppercase;
            opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none; white-space: nowrap;
            box-shadow: 0 4px 20px rgba(99,102,241,0.15);
        }
        #floor-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── 吹き出し ── */
        .popup-inner {
            display: flex; align-items: center; gap: 10px;
            background: white;
            border-radius: 16px;
            padding: 11px 18px 11px 13px;
            box-shadow: 0 8px 30px rgba(99,102,241,0.18), 0 2px 8px rgba(0,0,0,0.06);
            animation: popupIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            border: 1.5px solid rgba(99,102,241,0.12);
        }
        .popup-tail {
            width: 0; height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 9px solid white;
            margin: 0 auto;
            filter: drop-shadow(0 3px 2px rgba(99,102,241,0.1));
        }
        .popup-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
        .popup-text { display: flex; flex-direction: column; gap: 2px; }
        .popup-name { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 0.3px; }
        .popup-desc { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; }
        @keyframes popupIn {
            0%   { transform:translate(-50%,-100%) scale(0.75); opacity:0; }
            60%  { transform:translate(-50%,-100%) scale(1.04); }
            100% { transform:translate(-50%,-100%) scale(1); opacity:1; }
        }

        /* ── 常時表示ラベル ── */
        #labels-container {
            position: fixed; inset: 0;
            z-index: 10; pointer-events: none;
        }
        .room-label {
            position: fixed;
            display: flex; align-items: center; gap: 5px;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid var(--color, #6366f1);
            border-radius: 999px;
            padding: 4px 10px 4px 6px;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.3s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
        }
        .room-label-icon { font-size: 14px; line-height: 1; }
        .room-label-name {
            font-size: 11px; font-weight: 600;
            color: #1e1b4b; letter-spacing: 0.3px;
        }

        /* ── 詳細パネル ── */
        #detail-panel {
            position: fixed;
            bottom: -100%; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            width: min(400px, calc(100vw - 32px));
            background: white;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: bottom 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        #detail-panel.open { bottom: 0; }

        .detail-img {
            width: 100%; height: 180px;
            object-fit: cover; display: block;
        }
        .detail-img-placeholder {
            width: 100%; height: 160px;
            display: flex; align-items: center; justify-content: center;
        }
        .detail-img-icon { font-size: 64px; }

        .detail-body { padding: 20px 20px 28px; }

        .detail-header {
            display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
        }
        .detail-icon { font-size: 36px; line-height: 1; flex-shrink: 0; }
        .detail-floor {
            font-size: 10px; letter-spacing: 2px; color: var(--muted);
            text-transform: uppercase; font-weight: 500;
        }
        .detail-title {
            font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 0.3px;
        }

        .detail-tags {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
        }
        .detail-tag {
            font-size: 11px; padding: 3px 10px;
            background: rgba(99,102,241,0.08);
            color: var(--accent); border-radius: 999px;
            font-weight: 500; letter-spacing: 0.3px;
        }

        .detail-desc {
            font-size: 13px; line-height: 1.7; color: rgba(30,27,75,0.7);
            margin-bottom: 18px;
        }

        .detail-close {
            width: 100%; padding: 12px;
            background: rgba(99,102,241,0.06);
            border: 1.5px solid rgba(99,102,241,0.15);
            border-radius: 12px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: var(--accent);
            font-family: 'Outfit', sans-serif;
            transition: background 0.15s ease;
        }
        .detail-close:hover { background: rgba(99,102,241,0.12); }

        /* スマホでは詳細パネル全幅 */
        @media (max-width: 600px) {
            #detail-panel { width: 100%; border-radius: 20px 20px 0 0; }
            .detail-img { height: 150px; }
            .detail-img-placeholder { height: 130px; }
        }

        /* ── タッチ制御 ── */
        #header, #floor-selector, #info-panel, #controls-panel, #floor-toast {
            touch-action: none;
        }

        /* ── スマホ ── */
        @media (max-width: 600px) {
            #header { padding: 0 14px; height: 50px; }
            #title-main { font-size: 17px; }
            #title-sub, #header-date { display: none; }
            #header-right .h-divider { display: none; }
            #controls-panel, #info-panel { display: none; }
            #floor-selector {
                top: auto; bottom: 20px; right: 50%;
                transform: translateX(50%);
                flex-direction: row; border-radius: 999px;
            }
            #floor-label { display: none; }
            .floor-btn {
                width: 72px; padding: 14px 8px;
                border-bottom: none; border-right: 1px solid var(--border);
            }
            .floor-btn:last-child { border-right: none; }
            .floor-btn.active::before {
                top: 0; left: 0; right: 0; bottom: auto;
                width: auto; height: 3px; border-radius: 0;
                background: linear-gradient(90deg, var(--accent), var(--accent2));
            }
            .floor-num { font-size: 22px; }
            #floor-toast { top: 60px; }
            #loading-logo { font-size: 44px; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div id="loading-logo">SCHOOL FEST</div>
        <div id="loading-sub">2026 · Interactive Map</div>
        <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
        <div id="loading-percent">0%</div>
    </div>

    <div id="three"></div>
    <!-- 常時表示ラベルのコンテナ -->
    <div id="labels-container"></div>
    <!-- 詳細パネル（ピンをクリックすると開く） -->
    <div id="detail-panel"></div>

    <div id="header">
        <div id="header-left">
            <div id="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
                </svg>
            </div>
            <div class="h-divider"></div>
            <div id="title-wrap">
                <div id="title-main">SCHOOL FEST 2026</div>
                <div id="title-sub">Interactive 3D Map</div>
            </div>
        </div>
        <div id="header-right">
            <div id="header-date"></div>
            <div class="h-divider"></div>
            <div id="status-chip"><div class="dot"></div><div id="status-text">LIVE</div></div>
        </div>
    </div>

    <div id="controls-panel">
        <div class="ctrl-item"><span class="ctrl-key">drag</span>回転</div>
        <div class="ctrl-item"><span class="ctrl-key">scroll</span>ズーム</div>
        <div class="ctrl-item"><span class="ctrl-key">R-drag</span>移動</div>
    </div>

    <div id="info-panel">
        <div class="info-icon-wrap">🏫</div>
        <div class="info-text">
            <div class="info-label">Event</div>
            <div class="info-value">学校祭 2026</div>
        </div>
    </div>

    <div id="floor-selector">
        <div id="floor-label">Floor</div>
        <button class="floor-btn" data-floor="4" onclick="selectFloor(this,4)">
            <span class="floor-num">4F</span><span class="floor-tag">Top</span>
        </button>
        <button class="floor-btn" data-floor="3" onclick="selectFloor(this,3)">
            <span class="floor-num">3F</span><span class="floor-tag">3rd</span>
        </button>
        <button class="floor-btn" data-floor="2" onclick="selectFloor(this,2)">
            <span class="floor-num">2F</span><span class="floor-tag">2nd</span>
        </button>
        <button class="floor-btn active" data-floor="1" onclick="selectFloor(this,1)">
            <span class="floor-num">1F</span><span class="floor-tag">Ground</span>
        </button>
    </div>

    <div id="floor-toast"></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.7.4/umd/index.js"></script>
    <script>window.fflate = fflate;</script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="./main.js"></script>
    <script>
        function updateDate() {
            const now = new Date();
            const d = now.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });
            const t = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('header-date').textContent = d + '  ' + t;
        }
        updateDate(); setInterval(updateDate, 10000);

        const floorCameraPositions = {
            1: { pos: [600, 200, 600], target: [0,   0, 0] },
            2: { pos: [600, 400, 600], target: [0, 150, 0] },
            3: { pos: [600, 600, 600], target: [0, 300, 0] },
            4: { pos: [600, 800, 600], target: [0, 450, 0] },
        };
        const floorNames = { 1:'1F  Ground Floor', 2:'2F  2nd Floor', 3:'3F  3rd Floor', 4:'4F  Top Floor' };
        let toastTimer = null;

        function selectFloor(btn, floor) {
            if (window._currentFloor === floor) {
                document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
                if (window.applyFloorFilter) window.applyFloorFilter(null);
                window._currentFloor = null;
                showToast('ALL FLOORS');
                return;
            }
            document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cfg = floorCameraPositions[floor];
            if (window._mapCamera && window._mapControls)
                animateCamera(window._mapCamera, window._mapControls, cfg.pos, cfg.target, 800);
            if (window.applyFloorFilter) window.applyFloorFilter(floor);
            showToast(floorNames[floor]);
        }

        function showToast(text) {
            const toast = document.getElementById('floor-toast');
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function animateCamera(camera, controls, targetPos, targetLook, duration) {
            const startPos = camera.position.clone(), startLook = controls.target.clone();
            const endPos = new THREE.Vector3(...targetPos), endLook = new THREE.Vector3(...targetLook);
            const t0 = performance.now(), ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
            (function tick(now) {
                const t = Math.min((now - t0) / duration, 1), e = ease(t);
                camera.position.lerpVectors(startPos, endPos, e);
                controls.target.lerpVectors(startLook, endLook, e);
                controls.update();
                if (t < 1) requestAnimationFrame(tick);
            })(performance.now());
        }
    </script>
</body>
</html>
